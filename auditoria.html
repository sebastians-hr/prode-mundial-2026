*{box-sizing:border-box;margin:0;padding:0}
html,body{

body{padding:16px 12px 60px}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:24px;letter-spacing:1px;color:var(--celeste);margin-bottom:4px}

.loading{text-align:center;padding:50px 20px;color:var(--muted)}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--borde);border-top-color:var(--celeste);border-radius:50%;animation:spin .8s linear infinite}

.err{background:rgba(230,57,70,.12);border:1px solid var(--rojo);color:#ffb3ba;border-radius:10px;padding:14px;font-size:13px}

.jdetalle b{color:var(--celeste-l)}
.jdetalle .a{color:var(--verde)} .jdetalle .e{color:var(--dorado)} .jdetalle .f{color:var(--rojo)}

table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
th{text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:8px 8px;border-bottom:1px solid var(--borde)}
td{padding:8px 8px;border-bottom:1px solid rgba(31,56,102,.5);vertical-align:middle}
th.num,td.num{text-align:right;white-space:nowrap}

tr.exacto  td:first-child{border-left:3px solid var(--dorado)}
tr.fallo   td:first-child{border-left:3px solid #44546e}
.tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.5px}
.tag.acierto{background:rgba(16,185,129,.18);color:#6ee7b7}
.tag.exacto{background:rgba(255,204,0,.18);color:var(--dorado-l)}
.tag.fallo{background:rgba(120,140,170,.18);color:#9fb3cc}
.tag.sin{background:rgba(120,140,170,.12);color:#7a92b5}
.delta.pos{color:var(--verde);font-weight:700}

.saldo{font-weight:800;color:var(--celeste-l)}

.op{font-weight:800;color:var(--celeste)}

.mid{color:var(--muted);font-size:11px}

// ============================================================
// cuotasOverride / getCuotas (copiado tal cual de app.js)

let cuotasOverride = {};
function getCuotas(id, defL, defE, defV){
  const o = cuotasOverride[id];
  return o ? [o.cL, o.cE, o.cV] : [defL, defE, defV];
}

// Estado mínimo: la app usa S.resultados dentro de calcFichas/esCerrado
const S = { resultados: {} };

// ============================================================
// Funciones copiadas tal cual de app.js
// ============================================================
function parseFechaPartido(fecha, hora){
  const [dia, mes] = fecha.split('/');
  const [hh, mm]   = hora.split(':');
  return new Date(`2026-${mes.padStart(2,'0')}-${dia.padStart(2,'0')}T${hh}:${mm}:00-03:00`);
}

// Partido cerrado = tiene resultado real OR faltan ≤ 2 min para empezar
function esCerrado(p){
  if(S.resultados[p[0]]?.real) return true;
  if(p[3].startsWith('?')) return false; // knockout sin equipos aún
  const inicio = parseFechaPartido(p[1], p[2]);
  return Date.now() >= inicio.getTime() - 2 * 60 * 1000;
}

// Normalizar pronóstico al nuevo formato
function normPron(v){
  if(!v) return {op:null, gL:null, gV:null};
  if(typeof v === 'string') return {op:v, gL:null, gV:null};
  return v;
}

function calcFichas(j){
  let fichas=FICHAS_INI, aciertos=0, exactos=0, fallados=0, sinApostar=0, pendientes=0;
  const pron=j.pronosticos||{};
  FX.forEach(p=>{
    const r=S.resultados[p[0]];
    const [cL,cE,cV] = getCuotas(p[0], p[7], p[8], p[9]);
    if(r?.real){
      fichas -= 1; // costo de la ficha
      const ap = normPron(pron[p[0]]);
      if(!ap.op){
        sinApostar++;
      } else if(ap.op === r.real){
        const cuota = {'1':cL,'X':cE,'2':cV}[ap.op]||1;
        // Resultado exacto: ganancia ×2
        if(ap.gL !== null && ap.gV !== null && ap.gL === r.gL && ap.gV === r.gV){
          fichas += cuota * 2 - 1;
          exactos++;
        } else {
          fichas += cuota;
        }
        aciertos++;
      } else {
        fallados++;
      }
    } else {
      const ap = normPron(pron[p[0]]);
      if(!p[3].startsWith('?') && !esCerrado(p) && !ap.op) pendientes++;
    }
  });
  return {
    fichas: Math.round(fichas*100)/100,
    aciertos, exactos, fallados, sinApostar, pendientes
  };
}

  if(!code) return '?';

}
function flagEquipo(code){
  const c = (code||'').startsWith('?') ? code.slice(1) : code;
  return EQ[c] ? EQ[c].f : '';
}

function buildFilas(j){
  // Mismos criterios que calcFichas: solo partidos con resultado real.
  // Orden cronológico con parseFechaPartido.
  const pron = j.pronosticos||{};
  const jugados = FX.filter(p=>S.resultados[p[0]]?.real)
    .sort((a,b)=>parseFechaPartido(a[1],a[2]).getTime()-parseFechaPartido(b[1],b[2]).getTime());

  let saldo = FICHAS_INI;
  const filas = [];
  jugados.forEach(p=>{
    const r = S.resultados[p[0]];
    const [cL,cE,cV] = getCuotas(p[0], p[7], p[8], p[9]);
    const ap = normPron(pron[p[0]]);

    // Replica EXACTA del bloque de calcFichas para un partido liquidado
    let delta = -1; // costo de la ficha
    let tipo = 'fallo'; // fallo | sinApostar | acierto | exacto
    if(!ap.op){
      tipo = 'sinApostar';
    } else if(ap.op === r.real){
      const cuota = {'1':cL,'X':cE,'2':cV}[ap.op]||1;
      if(ap.gL !== null && ap.gV !== null && ap.gL === r.gL && ap.gV === r.gV){
        delta += cuota * 2 - 1; // ganancia ×2 (fórmula app: cuota*2-1)
        tipo = 'exacto';
      } else {
        delta += cuota;
        tipo = 'acierto';
      }
    } else {
      tipo = 'fallo';
    }
    delta = Math.round(delta*100)/100;
    saldo = Math.round((saldo + delta)*100)/100;

    filas.push({ p, r, ap, delta, saldo, tipo });
  });
  return filas;
}

// ============================================================
// RENDER
// ============================================================
function fmt(n){
  // entero limpio o hasta 2 decimales
  return (Math.round(n*100)/100).toString();
}

function renderJugador(j){
  const stats = calcFichas(j);
  const filas = buildFilas(j);
  const totalFilas = filas.length ? filas[filas.length-1].saldo : FICHAS_INI;

  let rows = '';
  filas.forEach(({p,r,ap,delta,saldo,tipo})=>{
    const local = nombreEquipo(p[3]), visit = nombreEquipo(p[4]);
    const fl = flagEquipo(p[3]), fv = flagEquipo(p[4]);

    // Tu pronóstico
    let pronTxt;
    if(!ap.op){
      pronTxt = '<span class="tag sin">SIN APOSTAR</span>';
    } else {
      const marc = (ap.gL!==null && ap.gV!==null) ? ` <span class="marcador">${ap.gL}-${ap.gV}</span>` : '';
      pronTxt = `<span class="op">${OP_TXT[ap.op]}</span>${marc}`;
    }
    // Resultado real
    const realMarc = (r.gL!=null && r.gV!=null) ? `${r.gL}-${r.gV}` : '';
    const realTxt = `<span class="op">${OP_TXT[r.real]||r.real}</span> <span class="marcador">${realMarc}</span>`;

    let tag;
    if(tipo==='exacto')   tag='<span class="tag exacto">EXACTO</span>';
    else if(tipo==='acierto') tag='<span class="tag acierto">ACIERTO</span>';
    else if(tipo==='sinApostar') tag='<span class="tag sin">NO JUGÓ</span>';
    else tag='<span class="tag fallo">FALLO</span>';

    const trClass = (tipo==='exacto') ? 'exacto' : (tipo==='acierto' ? 'acierto' : 'fallo');
    const deltaClass = delta>=0 ? 'pos' : 'neg';
    const deltaTxt = (delta>=0?'+':'') + fmt(delta);

    rows += `<tr class="${trClass}">
      <td><div class="equipos"><span class="flag">${fl}</span> ${local} <span class="mid">vs</span> ${visit} <span class="flag">${fv}</span></div><div class="mid">${p[0]} · ${p[1]} ${p[2]}</div></td>
      <td class="pron">${pronTxt}</td>
      <td class="real">${realTxt}</td>
      <td>${tag}</td>
      <td class="num"><span class="delta ${deltaClass}">${deltaTxt}</span></td>
      <td class="num"><span class="saldo">${fmt(saldo)}</span></td>
    </tr>`;
  });

  if(!rows){
    rows = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">Todavía no hay partidos liquidados.</td></tr>`;
  }

  // Verificación: total de la tabla debe coincidir con calcFichas
  const coincide = (totalFilas === stats.fichas);
  const aviso = coincide ? '' :
    `<div class="err" style="margin-bottom:12px">⚠️ Saldo de tabla (${fmt(totalFilas)}) ≠ calcFichas (${fmt(stats.fichas)})</div>`;

  return `<div class="jcard">
    ${aviso}
    <div class="jhead">
      <h2>${j.nombre}</h2>
      <div class="jtotal">${fmt(stats.fichas)} 🎟️</div>
    </div>
    <div class="jdetalle">
      <b>Aciertos:</b> <span class="a">${stats.aciertos}</span> &nbsp;·&nbsp;
      <b>Exactos:</b> <span class="e">${stats.exactos}</span> &nbsp;·&nbsp;
      <b>Fallos:</b> <span class="f">${stats.fallados}</span> &nbsp;·&nbsp;
      <b>No jugó:</b> ${stats.sinApostar} &nbsp;·&nbsp;
      <b>Partidos liquidados:</b> ${filas.length}
    </div>
    <div class="tablewrap">
      <table>
        <thead><tr>
          <th>Partido</th>
          <th>Tu pronóstico</th>
          <th>Resultado real</th>
          <th>Estado</th>
          <th class="num">Fichas</th>
          <th class="num">Saldo</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ============================================================
// CARGA DE DATOS (Firestore en vivo, mismas colecciones que la app)
// ============================================================
async function fbGetJugadores(){
  const snap = await getDocs(collection(db,'jugadores'));
  return snap.docs.map(d=>d.data());
}
async function fbGetResultados(){
  const s = await getDoc(doc(db,'resultados','main'));
  return s.exists() ? (s.data().resultados||{}) : {};
}
async function fbGetCuotas(){
  const s = await getDoc(doc(db,'cuotas','main'));
  return s.exists() ? (s.data().cuotas||{}) : {};
}

function norm(s){ return (s||'').toString().trim().toLowerCase(); }

async function main(){
  const cont = document.getElementById('contenido');
  try{
    const [jugadores, resultados, cuotas] = await Promise.all([
      fbGetJugadores(), fbGetResultados(), fbGetCuotas()
    ]);
    S.resultados = resultados || {};
    cuotasOverride = cuotas || {};

    let html = '';
    for(const nombre of JUGADORES_AUDITAR){
      const j = jugadores.find(x=>norm(x.nombre)===norm(nombre));
      if(!j){
        html += `<div class="jcard"><div class="jhead"><h2>${nombre}</h2></div><div class="err">No se encontró este jugador en Firestore.</div></div>`;
        continue;
      }
      html += renderJugador(j);
    }
    cont.innerHTML = html;
  }catch(e){
    cont.innerHTML = `<div class="err">Error al cargar datos de Firestore:<br>${(e && e.message) ? e.message : e}</div>`;
    console.error(e);
  }
}

main();
</script>
